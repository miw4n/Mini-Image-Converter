<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Mini Image Converter Pro</title>
  <style>
    :root {
      --primary: #0066ff;
      --bg: #1a1a1a;
      --card-bg: #ffffff;
      --text: #333;
      --border: #eee;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      max-width: 980px;
      margin: 24px auto;
      padding: 18px;
      background: var(--bg);
      color: var(--text);
    }

    h1 { font-size: 22px; margin: 0 0 15px; color: #fff; text-align: center; }

    .card {
      background: var(--card-bg);
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .drop-zone {
      border: 2px dashed #ccc;
      padding: 30px;
      text-align: center;
      border-radius: 10px;
      cursor: pointer;
      margin-bottom: 20px;
      transition: 0.3s;
      background: #f9f9f9;
    }
    .drop-zone:hover { border-color: var(--primary); background: #f0f7ff; }

    .controls {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 15px;
      margin-bottom: 20px;
    }

    .control-group { display: flex; flex-direction: column; gap: 5px; }
    label { font-size: 13px; font-weight: 600; color: #555; }
    
    input[type=number], select, input[type=range], .btn {
      padding: 8px;
      border-radius: 6px;
      border: 1px solid #ddd;
      font-size: 13px;
    }

    .row-actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 15px; }
    
    .btn { 
      cursor: pointer; font-weight: bold; border: none; flex: 1;
      transition: opacity 0.2s;
    }
    .btn-main { background: var(--primary); color: white; }
    .btn-zip { background: #28a745; color: white; }
    .btn-clear { background: #666; color: white; }
    .btn:hover { opacity: 0.9; }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      margin-top: 20px;
    }

    .tile {
      background: white;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ddd;
      text-align: center;
    }

    img.preview {
      max-width: 100%;
      height: 120px;
      object-fit: contain;
      background: #eee;
      border-radius: 4px;
    }

    .meta { font-size: 11px; color: #666; margin: 8px 0; }
    .filter-group { display: flex; gap: 10px; align-items: center; grid-column: span 2; }
  </style>
</head>
<body>

  <h1>Mini Image Converter</h1>
<script type="text/javascript" src="https://cdnjs.buymeacoffee.com/1.0.0/button.prod.min.js" data-name="bmc-button" data-slug="miw4n" data-color="#ffffff" data-emoji="🧋" data-font="Cookie" data-text="Buy me a bubble tea" data-outline-color="#000000" data-font-color="#000000" data-coffee-color="#FFDD00" ></script>
  <div class="card">
    <div class="drop-zone" id="dropArea">
      <strong>Glisser-déposer ou cliquer ici</strong>
      <input id="files" type="file" accept="image/*" multiple style="display:none" />
    </div>

    <div class="controls">
      <div class="control-group">
        <label>Format de sortie</label>
        <select id="outFormat">
          <option value="image/png">PNG (.png)</option>
          <option value="image/jpeg">JPEG (.jpg)</option>
          <option value="image/webp">WebP (.webp)</option>
          <option value="image/avif">AVIF (.avif)</option>
          <option value="image/bmp">BMP (.bmp)</option>
        </select>
      </div>

      <div class="control-group">
        <label>Qualité: <span id="qLabel">0.92</span></label>
        <input id="quality" type="range" min="0.1" max="1" step="0.01" value="0.92">
      </div>

      <div class="control-group">
        <label>Largeur (px)</label>
        <input id="width" type="number" placeholder="Original">
      </div>

      <div class="control-group">
        <label>Hauteur (px)</label>
        <input id="height" type="number" placeholder="Original">
      </div>

      <div class="control-group">
        <label>Présets</label>
        <select id="preset">
          <option value="">— Aucun —</option>
          <option value="1920">HD large (1920)</option>
          <option value="1280">Web (1280)</option>
          <option value="1024">Tablette (1024)</option>
          <option value="800">Mobile (800)</option>
          <option value="400">Mini (400)</option>
        </select>
      </div>

      <div class="control-group" style="justify-content: center;">
        <label><input id="keepAspect" type="checkbox" checked> Ratio constant</label>
      </div>

      <div class="filter-group">
        <label><input id="chkGray" type="checkbox"> Noir & Blanc</label>
        <label><input id="chkInvert" type="checkbox"> Inverser les couleurs</label>
      </div>
    </div>

    <div class="row-actions">
      <button id="convert" class="btn btn-main">CONVERTIR</button>
      <button id="downloadZip" class="btn btn-zip">ZIP ALL</button>
      <button id="clear" class="btn btn-clear">EFFACER</button>
    </div>
  </div>

  <div id="out" class="gallery"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script>
    const filesEl=document.getElementById('files'), dropBtn=document.getElementById('dropArea'), outEl=document.getElementById('out');
    const convertBtn=document.getElementById('convert'), clearBtn=document.getElementById('clear'), zipBtn=document.getElementById('downloadZip');
    const outFormatEl=document.getElementById('outFormat'), qualityEl=document.getElementById('quality'), qLabel=document.getElementById('qLabel');
    const widthEl=document.getElementById('width'), heightEl=document.getElementById('height'), keepAspectEl=document.getElementById('keepAspect'), presetEl=document.getElementById('preset');
    const chkGray=document.getElementById('chkGray'), chkInvert=document.getElementById('chkInvert');
    
    let convertedFiles=[];

    // Sync UI
    qualityEl.oninput=()=>qLabel.textContent=qualityEl.value;
    presetEl.onchange=()=>{ if(presetEl.value) { widthEl.value=presetEl.value; heightEl.value=''; } };
    dropBtn.onclick=()=>filesEl.click();

    // Drag & Drop
    ['dragenter','dragover'].forEach(e=>dropBtn.addEventListener(e,ev=>{ev.preventDefault();dropBtn.style.background='#eef';}));
    ['dragleave','drop'].forEach(e=>dropBtn.addEventListener(e,ev=>{ev.preventDefault();dropBtn.style.background='#f9f9f9';}));
    dropBtn.addEventListener('drop',async ev=>{ if(ev.dataTransfer?.files){ filesEl.files=ev.dataTransfer.files; handleFiles(filesEl.files); }});
    filesEl.onchange=()=>handleFiles(filesEl.files);

    clearBtn.onclick=()=>{ outEl.innerHTML=''; filesEl.value=''; convertedFiles=[]; };

    async function handleFiles(fileList){
      outEl.innerHTML='';
      for(const file of fileList){
        const tile=document.createElement('div'); tile.className='tile';
        tile.innerHTML=`<img src="${URL.createObjectURL(file)}" class="preview"><div class="meta">${file.name}</div>`;
        outEl.appendChild(tile);
      }
    }

    convertBtn.onclick=async()=>{
      if(!filesEl.files.length) return alert('Sélectionnez des images.');
      outEl.innerHTML=''; convertedFiles=[];
      for(const file of filesEl.files) await processFile(file);
    };

    async function processFile(file){
      const bitmap = await createImageBitmap(file);
      let tw = parseInt(widthEl.value) || null, th = parseInt(heightEl.value) || null;
      
      if(tw && !th && keepAspectEl.checked) th = Math.round(tw * bitmap.height / bitmap.width);
      if(th && !tw && keepAspectEl.checked) tw = Math.round(th * bitmap.width / bitmap.height);
      if(!tw && !th) { tw = bitmap.width; th = bitmap.height; }

      const canvas = document.createElement('canvas');
      canvas.width = tw; canvas.height = th;
      const ctx = canvas.getContext('2d');

      // Application des filtres
      let f = [];
      if(chkGray.checked) f.push('grayscale(100%)');
      if(chkInvert.checked) f.push('invert(100%)');
      ctx.filter = f.length ? f.join(' ') : 'none';

      ctx.drawImage(bitmap, 0, 0, tw, th);

      const outMime = outFormatEl.value;
      let blob = (outMime === 'image/bmp') ? canvasToBMPBlob(canvas) : await new Promise(r => canvas.toBlob(r, outMime, parseFloat(qualityEl.value)));
      
      const name = file.name.replace(/\.[^/.]+$/, "") + '_conv' + mimeToExt(outMime);
      convertedFiles.push({ name, blob });

      const url = URL.createObjectURL(blob);
      const tile = document.createElement('div'); tile.className='tile';
      tile.innerHTML = `<img src="${url}" class="preview"><div class="meta">${name}<br>${Math.round(blob.size/1024)} KB</div>
                        <a href="${url}" download="${name}" class="btn btn-main" style="display:block;text-decoration:none;font-size:11px">Télécharger</a>`;
      outEl.appendChild(tile);
    }

    function mimeToExt(m){ return { 'image/jpeg':'.jpg','image/png':'.png','image/webp':'.webp','image/avif':'.avif','image/bmp':'.bmp' }[m]; }

    zipBtn.onclick=async()=>{
      if(!convertedFiles.length) return alert('Rien à zipper !');
      const zip=new JSZip();
      convertedFiles.forEach(f=>zip.file(f.name,f.blob));
      const b=await zip.generateAsync({type:'blob'});
      const a=document.createElement('a'); a.href=URL.createObjectURL(b); a.download='images.zip'; a.click();
    };

    // Encodeur BMP
    function canvasToBMPBlob(canvas){
      const w=canvas.width,h=canvas.height,ctx=canvas.getContext('2d'),imgd=ctx.getImageData(0,0,w,h),pixels=imgd.data;
      const rowSize=Math.floor((24*w+31)/32)*4,pixelDataSize=rowSize*h,headerSize=54,fileSize=headerSize+pixelDataSize;
      const buffer=new ArrayBuffer(fileSize),view=new DataView(buffer);
      let offset=0;
      view.setUint8(offset,0x42);offset++;view.setUint8(offset,0x4D);offset++;
      view.setUint32(offset,fileSize,true);offset+=4;view.setUint32(offset,0,true);offset+=4;
      view.setUint32(offset,headerSize,true);offset+=4;view.setUint32(offset,40,true);offset+=4;
      view.setInt32(offset,w,true);offset+=4;view.setInt32(offset,h,true);offset+=4;
      view.setUint16(offset,1,true);offset+=2;view.setUint16(offset,24,true);offset+=2;
      view.setUint32(offset,0,true);offset+=4;view.setUint32(offset,pixelDataSize,true);offset+=4;
      view.setInt32(offset,2835,true);offset+=4;view.setInt32(offset,2835,true);offset+=4;
      let p=headerSize;const rowPad=rowSize-w*3;
      for(let y=h-1;y>=0;y--){
        for(let x=0;x<w;x++){
          const i=(y*w+x)*4;view.setUint8(p++,pixels[i+2]);view.setUint8(p++,pixels[i+1]);view.setUint8(p++,pixels[i]);
        }
        for(let k=0;k<rowPad;k++)view.setUint8(p++,0);
      }
      return new Blob([buffer],{type:'image/bmp'});
    }
  </script>
</body>
</html>
